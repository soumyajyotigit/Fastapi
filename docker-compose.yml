services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # CI/CD supplies API_IMAGE with the immutable image tag to deploy.
    # The default keeps local `docker compose up --build` unchanged.
    image: ${API_IMAGE:-fastapi-project:latest}
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/fastapi_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fastapi_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
