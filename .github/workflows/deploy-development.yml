name: Build development image

on:
  push:
    branches:
      - develop
      - soumya-draft
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional additional Docker image tag (for example, v1.0.0)
        required: false
        type: string

concurrency:
  group: development-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/fastapi

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ inputs.image_tag || github.sha }}
            ${{ env.IMAGE_NAME }}:development
          cache-from: type=gha
          cache-to: type=gha,mode=max
